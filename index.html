<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LION OS</title>
    <style>
        :root {
            --primary-color: #6200ee;
            --secondary-color: #03dac6;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* שורת סטטוס עליונה */
        .status-bar {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold;
            z-index: 100;
        }

        .xp-badge {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            padding: 2px 10px;
            border-radius: 15px;
            color: white;
        }

        /* תצוגת מסכים */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .active { display: flex; }

        /* כפתור הבית */
        .home-btn {
            position: fixed;
            bottom: 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 1000;
        }

        /* עיצוב כפתורי האפליקציות */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .app-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .app-card:active { transform: scale(0.9); }
        .app-card i { font-size: 40px; margin-bottom: 10px; }

        /* חדר רוגע - העיצוב המקורי */
        #calm-room {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            justify-content: center;
        }

        .breathe-circle {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.3);
            border: 5px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
            animation: breathe 8s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        /* כפתור אדום */
        .red-btn {
            background: #ff4757;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid #ff6b81;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
            margin: 50px auto;
            cursor: pointer;
        }

        #timer-display { font-size: 48px; font-weight: bold; color: #ff4757; }

    </style>
</head>
<body>

    <div class="status-bar">
        <span>LION OS 🦁</span>
        <span class="xp-badge">XP: <span id="xp-count">0</span></span>
    </div>

    <div id="home" class="screen active">
        <h1>היי יהל! 👋</h1>
        <p>מה את רוצה לעשות היום?</p>
        
        <div class="app-grid">
            <div class="app-card" onclick="showScreen('calm-room')">
                <span>🧘</span>
                <span>חדר רוגע</span>
            </div>
            <div class="app-card" onclick="alert('משחקים בקרוב!')">
                <span>🎮</span>
                <span>משחקים</span>
            </div>
            <div class="app-card" onclick="showScreen('emergency')">
                <span>🔴</span>
                <span>כפתור אדום</span>
            </div>
            <div class="app-card" onclick="alert('הגדרות')">
                <span>⚙️</span>
                <span>הגדרות</span>
            </div>
        </div>
    </div>

    <div id="calm-room" class="screen">
        <div class="breathe-circle" id="breathe-text">שאיפה...</div>
        <p style="color: white; margin-top: 30px; font-weight: bold;">קחי נשימות עמוקות עם העיגול</p>
        
        <button onclick="toggleAudio()" id="audio-control" style="background: white; border: none; padding: 10px 20px; border-radius: 20px; margin-top: 10px; cursor: pointer;">
            הפעל מוזיקת גשם 🌧️
        </button>

        <audio id="bg-music" loop>
            <source src="https://assets.mixkit.co/music/preview/mixkit-soft-rain-ambient-loop-3030.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="emergency" class="screen">
        <h2>זמן הפסקה מוחלט!</h2>
        <div class="red-btn" onclick="startEmergencyTimer()"></div>
        <div id="timer-display">02:00</div>
    </div>

    <button class="home-btn" onclick="goHome()">🏠 מסך בית</button>

    <script>
        let xp = 0;
        const bgMusic = document.getElementById('bg-music');
        const audioBtn = document.getElementById('audio-control');

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goHome() {
            bgMusic.pause();
            showScreen('home');
        }

        function toggleAudio() {
            if (bgMusic.paused) {
                bgMusic.play();
                audioBtn.innerText = "השתק 🔇";
            } else {
                bgMusic.pause();
                audioBtn.innerText = "הפעל מוזיקת גשם 🌧️";
            }
        }

        // טקסט נשימה משתנה
        setInterval(() => {
            const txt = document.getElementById('breathe-text');
            txt.innerText = txt.innerText === "שאיפה..." ? "נשיפה..." : "שאיפה...";
        }, 4000);

        // טיימר כפתור אדום
        function startEmergencyTimer() {
            let timeLeft = 120;
            const display = document.getElementById('timer-display');
            const interval = setInterval(() => {
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                display.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    alert("ההפסקה נגמרה!");
                }
                timeLeft--;
            }, 1000);
        }
    </script>
</body>
</html>
