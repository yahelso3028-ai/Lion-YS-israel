<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LION OS - ISRAEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #005eb8; /* כחול ישראל */
            --bg: #f0f4f8;
            --white: #ffffff;
            --accent: #ff4d4d;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Assistant', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* מסכים */
        .screen { 
            display: none; 
            height: 100vh; 
            width: 100vw; 
            position: absolute; 
            top: 0; 
            left: 0; 
            flex-direction: column; 
            align-items: center; 
            background: var(--bg);
            padding-top: 50px;
        }
        .active { display: flex; }

        /* כותרות */
        h1 { color: var(--primary); font-size: 2.8rem; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .stats { background: var(--white); padding: 5px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* כפתורים */
        .btn {
            background: var(--white);
            border: 2px solid var(--primary);
            padding: 15px 30px;
            margin: 10px;
            border-radius: 50px;
            font-size: 1.2rem;
            color: var(--primary);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
            width: 80%;
            max-width: 300px;
            text-align: center;
            font-weight: bold;
        }
        .btn:active { transform: scale(0.95); }
        .btn-red { background: var(--accent); color: white; border: none; }

        /* חדר רוגע */
        #calm-room { background: linear-gradient(to bottom, #1e3c72, #2a5298); color: white; }
        .breathe-circle {
            width: 180px; height: 180px;
            border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            animation: breathe 8s infinite ease-in-out;
            margin: 40px 0;
            background: rgba(255,255,255,0.1);
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); background: rgba(255,255,255,0.2); }
        }

        /* משחקים */
        #game-container { position: relative; width: 300px; height: 400px; background: #fff; border: 3px solid var(--primary); overflow: hidden; border-radius: 15px; }
        #player { position: absolute; bottom: 0; left: 50px; width: 40px; height: 40px; background: var(--primary); border-radius: 5px; }
        .obstacle { position: absolute; bottom: 0; right: -50px; width: 30px; height: 40px; background: var(--accent); }
        
        .bubble { position: absolute; border-radius: 50%; background: rgba(0, 94, 184, 0.4); cursor: pointer; border: 2px solid var(--primary); }
        .apple { position: absolute; font-size: 30px; cursor: pointer; }

        /* טיימר אדום */
        #timer-display { font-size: 4rem; font-weight: bold; color: var(--accent); margin-top: 50px; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div style="font-size: 3rem;">🇮🇱🦁</div>
        <h1>LION OS</h1>
        <div class="stats">נקודות XP: <span id="xp-val">0</span></div>
        <button class="btn" onclick="showScreen('calm-room')">חדר רוגע 🧘</button>
        <button class="btn" onclick="startJumpGame()">משחק הקפיצה 🏃</button>
        <button class="btn" onclick="startBubbleGame()">פיצוץ בועות 🫧</button>
        <button class="btn" onclick="startAppleGame()">קטיף תפוחים 🍎</button>
        <button class="btn btn-red" onclick="showScreen('red-timer')">כפתור אדום 🚨</button>
    </div>

    <div id="calm-room" class="screen">
        <div class="breathe-circle" id="breathe-text">שאיפה...</div>
        <h2>קחי נשימה עמוקה</h2>
        <button class="btn" id="soundBtn" onclick="toggleCalmSound()" style="background: rgba(255,255,255,0.2); color: white; border-color: white;">
            הפעל סאונד מרגיע 🎵
        </button>
        <button class="btn" onclick="stopAndHome()" style="background: none; color: white; border: 1px solid white;">חזרה לבית 🏠</button>
        <audio id="rainSound" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="jump-game" class="screen">
        <h2>קפצי מעל המכשולים!</h2>
        <div id="game-container" onclick="jump()">
            <div id="player"></div>
        </div>
        <button class="btn" onclick="stopAndHome()">סיום 🏠</button>
    </div>

    <div id="bubble-game" class="screen">
        <h2>פוצצי כמה שיותר!</h2>
        <div id="bubble-area" style="width: 300px; height: 400px; position: relative; background: white; border-radius: 15px; border: 3px solid var(--primary);"></div>
        <button class="btn" onclick="stopAndHome()">סיום 🏠</button>
    </div>

    <div id="apple-game" class="screen">
        <h2>תפסי את התפוחים!</h2>
        <div id="apple-area" style="width: 300px; height: 400px; position: relative; background: #e8f5e9; border-radius: 15px; border: 3px solid #2e7d32;"></div>
        <button class="btn" onclick="stopAndHome()">סיום 🏠</button>
    </div>

    <div id="red-timer" class="screen" style="background: #ffebee;">
        <h1>זמן הפסקה</h1>
        <div id="timer-display">02:00</div>
        <button class="btn" onclick="stopAndHome()">ביטול 🏠</button>
    </div>

    <script>
        let xp = 0;
        const rainSound = document.getElementById('rainSound');

        function addXP(amount) {
            xp += amount;
            document.getElementById('xp-val').innerText = xp;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'red-timer') startTimer();
        }

        function stopAndHome() {
            rainSound.pause();
            rainSound.currentTime = 0;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            showScreen('home');
        }

        // --- סאונד ורוגע ---
        function toggleCalmSound() {
            if (rainSound.paused) {
                rainSound.play();
                document.getElementById('soundBtn').innerText = "הפסק סאונד ⏸️";
            } else {
                rainSound.pause();
                document.getElementById('soundBtn').innerText = "הפעל סאונד מרגיע 🎵";
            }
        }
        setInterval(() => {
            const bt = document.getElementById('breathe-text');
            bt.innerText = bt.innerText === "שאיפה..." ? "נשיפה..." : "שאיפה...";
        }, 4000);

        // --- משחק קפיצה ---
        let gameInterval;
        function startJumpGame() {
            showScreen('jump-game');
            let isJumping = false;
            const player = document.getElementById('player');
            
            // יצירת מכשול
            const container = document.getElementById('game-container');
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            container.appendChild(obs);

            let obsPos = 300;
            gameInterval = setInterval(() => {
                obsPos -= 5;
                if (obsPos < -30) {
                    obsPos = 300;
                    addXP(10);
                }
                obs.style.right = (300 - obsPos) + 'px';

                // בדיקת התנגשות
                let pBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
                if (obsPos < 90 && obsPos > 50 && pBottom < 40) {
                    alert("אופס! נסי שוב");
                    obsPos = 300;
                }
            }, 20);
        }

        function jump() {
            const p = document.getElementById('player');
            if (!p.classList.contains('animate')) {
                p.style.bottom = "100px";
                setTimeout(() => p.style.bottom = "0", 300);
            }
        }

        // --- בועות ---
        function startBubbleGame() {
            showScreen('bubble-game');
            const area = document.getElementById('bubble-area');
            area.innerHTML = "";
            gameInterval = setInterval(() => {
                const b = document.createElement('div');
                b.className = 'bubble';
                let size = Math.random() * 40 + 20;
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.top = Math.random() * 350 + 'px';
                b.style.left = Math.random() * 250 + 'px';
                b.onclick = () => { b.remove(); addXP(5); };
                area.appendChild(b);
                setTimeout(() => b.remove(), 2000);
            }, 800);
        }

        // --- תפוחים ---
        function startAppleGame() {
            showScreen('apple-game');
            const area = document.getElementById('apple-area');
            area.innerHTML = "";
            gameInterval = setInterval(() => {
                const a = document.createElement('div');
                a.className = 'apple';
                a.innerText = "🍎";
                a.style.top = "-50px";
                a.style.left = Math.random() * 260 + 'px';
                a.style.position = "absolute";
                a.style.transition = "top 2s linear";
                area.appendChild(a);
                setTimeout(() => a.style.top = "400px", 100);
                a.onclick = () => { a.remove(); addXP(15); };
                setTimeout(() => a.remove(), 2000);
            }, 1000);
        }

        // --- טיימר אדום ---
        let timerInterval;
        function startTimer() {
            let time = 120;
            const display = document.getElementById('timer-display');
            timerInterval = setInterval(() => {
                let min = Math.floor(time / 60);
                let sec = time % 60;
                display.innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
                if (--time < 0) {
                    clearInterval(timerInterval);
                    alert("ההפסקה הסתיימה! חוזרים בכוחות מחודשים");
                    stopAndHome();
                }
            }, 1000);
        }
    </script>
</body>
</html>
